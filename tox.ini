[tox]
min_version = 4.0
requires = tox-uv
env_list =
    lint
    py{311,312,313,314}
    docs

[testenv]
extras = all
deps =
    pytest>=8.0
    pytest-asyncio>=0.24
    pytest-httpserver>=1.1
commands =
    pytest {posargs}

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage[toml]>=7.0
commands =
    coverage run -m pytest {posargs}
    coverage report

[testenv:lint]
skip_install = true
deps = ruff>=0.11
commands =
    ruff check {posargs:src tests}
    ruff format --check {posargs:src tests}

[testenv:fix]
skip_install = true
deps = ruff>=0.11
commands =
    ruff check --fix {posargs:src tests}
    ruff format {posargs:src tests}

[testenv:docs]
extras = all
deps =
    sphinx>=8.0
    furo>=2024.1
    myst-parser>=4.0
commands =
    sphinx-build -b html docs docs/_build/html -W {posargs}

[tox]
min_version = 4.0
skip_missing_interpreters = true
env_list =
    lint
    py{311,312,313,314,315}-urllib3
    py{311,312,313,314,315}-all
    coverage-report
    docs

[testenv]
extras =
    all: all
deps =
    pytest>=8.0
    pytest-asyncio>=0.24
    pytest-httpserver>=1.1
    coverage[toml]>=7.0
commands =
    urllib3: coverage run -m pytest {posargs}
    all: coverage run -m pytest --all-backends {posargs}

[testenv:integration]
extras = all
deps =
    pytest>=8.0
    pytest-asyncio>=0.24
    pytest-httpserver>=1.1
commands =
    pytest -m integration -v --all-backends {posargs}

[testenv:coverage-report]
skip_install = true
depends = py{311,312,313,314,315}{-all,-urllib3}
parallel_show_output = true
deps =
    coverage[toml]>=7.0
commands =
    coverage combine
    coverage report
    coverage html

[testenv:lint]
skip_install = true
deps = ruff>=0.11
commands =
    ruff check {posargs:src tests}
    ruff format --check {posargs:src tests}

[testenv:fix]
skip_install = true
deps = ruff>=0.11
commands =
    ruff check --fix {posargs:src tests}
    ruff format {posargs:src tests}

[testenv:docs]
extras = all
deps =
    sphinx>=8.0
    furo>=2024.1
    myst-parser>=4.0
commands =
    sphinx-build -b html docs docs/_build/html -W {posargs}

[gh]
python =
    3.11 = py311-urllib3, py311-all
    3.12 = py312-urllib3, py312-all
    3.13 = py313-urllib3, py313-all
    3.14 = py314-urllib3, py314-all
    3.15 = py315-urllib3, py315-all
